  .header { padding: 24px 32px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; }
  .header h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
  .header .badge { display: inline-block; background: #1e40af; color: #bfdbfe; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; margin-top: 8px; }

  .container { padding: 24px 32px; }

  .managing-partner {
    text-align: center; margin-bottom: 32px;
  }
  .mp-card {
    display: inline-block; background: linear-gradient(135deg, #7c3aed, #4f46e5); padding: 16px 40px;
    border-radius: 16px; box-shadow: 0 8px 32px rgba(99,102,241,0.3);
  }
  .mp-card .name { font-size: 20px; font-weight: 700; color: #fff; }
  .mp-card .role { font-size: 12px; color: #c4b5fd; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .connector-line { width: 2px; height: 24px; background: #475569; margin: 0 auto; }

  .groups-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px;
  }

  .group-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden;
    transition: all 0.2s ease;
  }
  .group-card:hover { border-color: #4f46e5; box-shadow: 0 4px 24px rgba(79,70,229,0.15); }

  .group-header {
    padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid #334155; position: relative;
  }
  .group-header .sno {
    width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .group-header .info { flex: 1; }
  .group-header .info .gh-name { font-size: 15px; font-weight: 600; color: #f1f5f9; }
  .group-header .info .practice { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .group-header .count-badge {
    background: #334155; color: #94a3b8; font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 10px; flex-shrink: 0;
  }
  .group-header .chevron {
    width: 20px; height: 20px; transition: transform 0.2s; flex-shrink: 0; color: #64748b;
  }
  .group-card.open .chevron { transform: rotate(180deg); }

  .group-body { display: none; padding: 0; }
  .group-card.open .group-body { display: block; }

  .sub-head-bar {
    padding: 8px 20px; background: #1a2332; border-bottom: 1px solid #334155;
    font-size: 12px; color: #818cf8; font-weight: 500;
  }

  .team-tree { padding: 12px 16px; }
  .tree-node {
    margin-left: 0; padding: 6px 12px; border-left: 2px solid #334155;
    margin-bottom: 2px; cursor: pointer; border-radius: 0 6px 6px 0;
    transition: background 0.15s;
  }
  .tree-node:hover { background: #1a2332; }
  .tree-node.partner-level { border-left-color: #4f46e5; }
  .tree-node.ep-level { border-left-color: #7c3aed; }
  .tree-node.sp-level { border-left-color: #ec4899; }

  .tree-node .node-name { font-size: 13px; font-weight: 500; color: #e2e8f0; }
  .tree-node .node-role { font-size: 11px; color: #64748b; }
  .tree-node .node-loc { font-size: 11px; color: #475569; }

  .tree-children { margin-left: 20px; }
  .tree-children .tree-node { border-left-color: #1e3a5f; }

  .na-label { padding: 16px 20px; font-size: 13px; color: #ef4444; font-style: italic; }

  .legend { margin-top: 32px; display: flex; gap: 20px; flex-wrap: wrap; padding: 16px 20px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
  .legend-dot { width: 12px; height: 3px; border-radius: 2px; }

  .color-1 .sno { background: #4f46e5; color: #fff; }
  .color-2 .sno { background: #0891b2; color: #fff; }
  .color-3 .sno { background: #059669; color: #fff; }
  .color-4 .sno { background: #d97706; color: #fff; }
  .color-5 .sno { background: #dc2626; color: #fff; }
  .color-6 .sno { background: #7c3aed; color: #fff; }
  .color-7 .sno { background: #2563eb; color: #fff; }
  .color-8 .sno { background: #0d9488; color: #fff; }
  .color-9 .sno { background: #c026d3; color: #fff; }
  .color-10 .sno { background: #ea580c; color: #fff; }

  .stats-bar { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px 20px; min-width: 140px; }
  .stat-card .stat-val { font-size: 28px; font-weight: 700; color: #818cf8; }
  .stat-card .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .search-bar { margin-bottom: 20px; }
  .search-bar input {
    width: 100%; max-width: 400px; padding: 10px 16px; background: #1e293b; border: 1px solid #334155;
    border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none;
  }
  .search-bar input::placeholder { color: #475569; }
  .search-bar input:focus { border-color: #4f46e5; }
  .highlight { background: #4f46e520; border-left-color: #4f46e5 !important; }
</style>

const colors = ['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#2563eb','#0d9488','#c026d3','#ea580c'];

function getRoleClass(role) {
  if (role.includes('Senior Partner') || role.includes('Principal Partner')) return 'sp-level';
  if (role.includes('Executive Partner')) return 'ep-level';
  if (role === 'Partner' || role === 'Director') return 'partner-level';
  return '';
}

function renderTree(node, depth = 0) {
  if (!node.children || node.children.length === 0) {
    return `<div class="tree-node ${getRoleClass(node.role)}" data-name="${(node.name||'').toLowerCase()}">
      <span class="node-name">${node.name}</span>
      <span class="node-role"> · ${node.role}</span>
      ${node.location ? `<span class="node-loc"> · ${node.location}</span>` : ''}
    </div>`;
  }

  const childrenHtml = node.children.map(c => renderTree(c, depth + 1)).join('');

  if (node.role === 'Sub-Head/Lead') {
    return `<div class="sub-head-bar">▸ Sub-Head: ${node.name} — ${node.practice} (${node.count} members)</div>
    <div class="team-tree">${childrenHtml}</div>`;
  }

  return `<div class="tree-node ${getRoleClass(node.role)}" data-name="${(node.name||'').toLowerCase()}">
    <span class="node-name">${node.name}</span>
    <span class="node-role"> · ${node.role}${node.reports ? ` · ${node.reports} direct reports` : ''}</span>
    ${node.location ? `<span class="node-loc"> · ${node.location}</span>` : ''}
  </div>
  <div class="tree-children">${childrenHtml}</div>`;
}

// Stats

  <div class="stat-card"><div class="stat-val">${data.children.length}</div><div class="stat-label">Group Heads</div></div>
  <div class="stat-card"><div class="stat-val">${totalMembers}</div><div class="stat-label">Total Lawyers</div></div>
  <div class="stat-card"><div class="stat-val">10</div><div class="stat-label">Practice Areas</div></div>
`;

// Render groups
const groupsEl = document.getElementById('groups');
data.children.forEach((gh, i) => {
  const card = document.createElement('div');
  card.className = `group-card color-${i+1}`;
  card.innerHTML = `
    <div class="group-header" onclick="this.parentElement.classList.toggle('open')">
      <div class="sno">${i+1}</div>
      <div class="info">
        <div class="gh-name">${gh.name} <span style="font-weight:400;font-size:12px;color:#64748b">(${gh.full_name})</span></div>
        <div class="practice">${gh.practice}</div>
      </div>
      <div class="count-badge">${gh.count} members</div>
      <svg class="chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
    </div>
    <div class="group-body">
      <div class="team-tree">${gh.children.map(c => renderTree(c)).join('')}</div>
    </div>
  `;
  groupsEl.appendChild(card);
});

`;

// Search
document.getElementById('search').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('highlight'));
  if (!q) return;
  document.querySelectorAll('.tree-node').forEach(n => {
    if (n.dataset.name && n.dataset.name.includes(q)) {
      n.classList.add('highlight');
      let card = n.closest('.group-card');
      if (card && !card.classList.contains('open')) card.classList.add('open');
    }
  });
});
